<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Círculo principal -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#grad)" stroke-width="6"/>

  <!-- Onda 1 -->
  <path d="M40 100 Q60 60, 80 100 T120 100 T160 100"
        fill="none"
        stroke="#3b82f6"
        stroke-width="3"
        stroke-linecap="round"/>

  <!-- Onda 2 -->
  <path d="M40 110 Q60 150, 80 110 T120 110 T160 110"
        fill="none"
        stroke="#06b6d4"
        stroke-width="3"
        stroke-linecap="round"/>

  <!-- Ponto central (equilíbrio) -->
  <circle cx="100" cy="100" r="5" fill="#0f172a"/>

</svg>